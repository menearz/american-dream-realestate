<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 480" role="img" aria-label="American Dream Real Estate LLC" color="#FFFFFF">
  <title>American Dream Real Estate LLC</title>

  <!-- ===== MARK (centered at top) ===== -->
  <g transform="translate(130, 0)">
    <!-- Star -->
    <polygon points="120,48 125.3,62.7 140.9,63.2 128.6,72.8 132.9,87.8 120,79 107.1,87.8 111.4,72.8 99.1,63.2 114.7,62.7"
             fill="currentColor"/>

    <!-- House silhouette with door + windows cut out (even-odd fill rule) -->
    <path d="M 75,195 L 75,145 L 120,108 L 165,145 L 165,195 Z
             M 110,195 L 110,168 L 130,168 L 130,195 Z
             M 86,158 L 86,176 L 102,176 L 102,158 Z
             M 138,158 L 138,176 L 154,176 L 154,158 Z"
          fill="currentColor" fill-rule="evenodd"/>

    <!-- Three flag stripes inside the gable (slightly transparent) -->
    <g fill="currentColor" opacity="0.65">
      <rect x="108" y="124" width="24" height="2.8"/>
      <rect x="106" y="130" width="28" height="2.8"/>
      <rect x="104" y="136" width="32" height="2.8"/>
    </g>
  </g>

  <!-- ===== WORDMARK ===== -->
  <text x="250" y="310" font-family="'IM Fell English', Georgia, 'Times New Roman', serif"
        font-size="42" font-weight="400" fill="currentColor" text-anchor="middle" letter-spacing="2">AMERICAN DREAM</text>

  <!-- Decorative divider line -->
  <line x1="160" y1="334" x2="340" y2="334" stroke="currentColor" stroke-width="1" opacity="0.6"/>

  <!-- Subline -->
  <text x="250" y="372" font-family="'Libre Franklin', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="14" font-weight="500" fill="currentColor" text-anchor="middle" letter-spacing="6" opacity="0.9">REAL ESTATE LLC</text>

  <!-- Tagline -->
  <text x="250" y="418" font-family="'EB Garamond', Garamond, Georgia, serif"
        font-size="15" font-style="italic" fill="currentColor" text-anchor="middle" opacity="0.8">Life · Liberty · The Pursuit of Home</text>
</svg>
