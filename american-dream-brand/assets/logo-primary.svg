<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 480" role="img" aria-label="American Dream Real Estate LLC">
  <title>American Dream Real Estate LLC</title>

  <!-- ===== MARK (centered at top) ===== -->
  <g transform="translate(130, 0)">
    <!-- Star -->
    <polygon points="120,48 125.3,62.7 140.9,63.2 128.6,72.8 132.9,87.8 120,79 107.1,87.8 111.4,72.8 99.1,63.2 114.7,62.7"
             fill="#3C3B6E"/>

    <!-- House silhouette -->
    <path d="M 75,195 L 75,145 L 120,108 L 165,145 L 165,195 Z" fill="#3C3B6E"/>

    <!-- Three red flag stripes inside the gable -->
    <g fill="#B22234">
      <rect x="108" y="124" width="24" height="2.8"/>
      <rect x="106" y="130" width="28" height="2.8"/>
      <rect x="104" y="136" width="32" height="2.8"/>
    </g>

    <!-- Door -->
    <path d="M 110,195 L 110,168 Q 110,164 114,164 L 126,164 Q 130,164 130,168 L 130,195 Z" fill="#FFFFFF"/>
    <circle cx="125" cy="182" r="1.2" fill="#3C3B6E"/>

    <!-- Windows -->
    <g fill="#FFFFFF">
      <rect x="86" y="158" width="16" height="18" rx="1"/>
      <rect x="138" y="158" width="16" height="18" rx="1"/>
    </g>
    <g stroke="#3C3B6E" stroke-width="1.4">
      <line x1="94" y1="158" x2="94" y2="176"/>
      <line x1="86" y1="167" x2="102" y2="167"/>
      <line x1="146" y1="158" x2="146" y2="176"/>
      <line x1="138" y1="167" x2="154" y2="167"/>
    </g>
  </g>

  <!-- ===== WORDMARK ===== -->
  <text x="250" y="310" font-family="'IM Fell English', Georgia, 'Times New Roman', serif"
        font-size="42" font-weight="400" fill="#3C3B6E" text-anchor="middle" letter-spacing="2">AMERICAN DREAM</text>

  <!-- Decorative flag-stripe divider -->
  <g transform="translate(250, 332)">
    <rect x="-90" y="0" width="60" height="3" fill="#B22234"/>
    <rect x="-30" y="0" width="60" height="3" fill="#FFFFFF" stroke="#3C3B6E" stroke-width="0.5"/>
    <rect x="30" y="0" width="60" height="3" fill="#3C3B6E"/>
  </g>

  <!-- Subline -->
  <text x="250" y="372" font-family="'Libre Franklin', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="14" font-weight="500" fill="#3C3B6E" text-anchor="middle" letter-spacing="6">REAL ESTATE LLC</text>

  <!-- Tagline -->
  <text x="250" y="418" font-family="'EB Garamond', Garamond, Georgia, serif"
        font-size="15" font-style="italic" fill="#4A4A4A" text-anchor="middle">Life · Liberty · The Pursuit of Home</text>
</svg>
